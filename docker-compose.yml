services:
  app:
    build:
        context: ./backend
        dockerfile: Dockerfile
    container_name: backend__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - ./backend/config/.env
    environment:
      - SQLITE_DB_PATH=/data/open-wearables.db
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - sqlite_data:/data
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /root_project/app
        - action: sync+restart
          path: ./backend/config/.env
          target: /root_project/config/.env
        - action: sync
          path: ./backend/scripts
          target: /root_project/scripts
        - action: sync
          path: ./backend/tests
          target: /root_project/tests
        - action: rebuild
          path: ./backend/uv.lock
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend__open-wearables
    image: open-wearables-frontend:dev
    pull_policy: never
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - app
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml
        - action: rebuild
          path: ./frontend/vite.config.ts
    restart: on-failure

volumes:
  sqlite_data: